domain = "security"
subdomain = "hardening"
target_minutes = 3
voice_compatible = true

[[sprint.question]]
number = 1
tier = "RECALL"
difficulty = 1
xp = 10
text = "What prevents path traversal in exam file imports?"
code = ""
options = [
    "Sandboxed filesystem",
    "Canonical path resolution and home directory check",
    "File extension whitelist only",
    "Read-only file permissions"
]
answer = 1
hint = "Check the daemon's import command handler"
explanation = "Files are resolved to canonical paths and verified to be under the user's home directory before reading."

[[sprint.question]]
number = 2
tier = "COMPREHENSION"
difficulty = 2
xp = 10
text = "Why does the Unix socket have 0700 permissions?"
code = ""
options = [
    "Default Go socket permissions",
    "Only socket owner can connect, preventing other users from sending commands",
    "Required for systemd integration",
    "Performance optimization"
]
answer = 1
hint = "Think about multi-user systems"
explanation = "0700 means only the owner can read/write/execute. Other users on the system cannot connect to the daemon."

[[sprint.question]]
number = 3
tier = "ANALYSIS"
difficulty = 3
xp = 15
text = "Questions load in browser but not in Wails native window. What's the likely cause?"
code = ""
options = [
    "Different JavaScript engines",
    "Wails binding not generated after adding new Go method",
    "CORS policy difference",
    "WebKit version incompatibility"
]
answer = 1
hint = "Wails generates TypeScript bindings from Go"
explanation = "After adding new methods to app.go, run 'wails generate module' to regenerate bindings in frontend/wailsjs/."
