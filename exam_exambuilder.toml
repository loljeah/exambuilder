    "Markdown with regex parsing",
    "TOML with native decoding",
    "YAML with custom parser",
    "JSON with schema validation"
]
answer = 1
hint = "Check DATASTRUCT.md"
explanation = "TOML v2.0 format enables single-pass parsing with the BurntSushi/toml library, eliminating complex regex."

[[sprint.question]]
number = 2
tier = "COMPREHENSION"
difficulty = 2
xp = 10
text = "Why must Q1 in every sprint have difficulty = 1?"
code = ""
options = [
    "Technical limitation of the parser",
    "ADHD design: easy win for dopamine kickstart",
    "Database schema constraint",
    "Voice mode requirement"
]
answer = 1
hint = "Read the ADHD design principles"
explanation = "Starting with an easy win reduces activation energy and provides immediate positive feedback, crucial for ADHD learners."

[[sprint.question]]
number = 3
tier = "APPLICATION"
difficulty = 3
xp = 10
text = "Validation fails with 'must have exactly 4 options'. Which field is wrong?"
code = """
[[sprint.question]]
options = [
    "Option A",
    "Option B",
    "Option C"
]
"""
options = [
    "tier is missing",
    "options array has only 3 elements",
    "answer index is out of range",
    "code field is required"
]
answer = 1
hint = "Count the array elements"
explanation = "The options array must have exactly 4 elements. This ensures consistent MC format for voice mode."

# Sprint 3: Voice Integration
[[sprint]]
number = 3
topic = "Voice Integration"
domain = "voice"
subdomain = "piper_tts"
target_minutes = 3
voice_compatible = true

[[sprint.question]]
number = 1
tier = "RECALL"
difficulty = 1
xp = 10
text = "What Unix socket does the Piper TTS daemon listen on by default?"
code = ""
options = [
    "/tmp/tts.sock",
    "/tmp/piper-daemon.sock",
    "/var/run/piper.sock",
    "/tmp/voice/piper.sock"
]
answer = 1
hint = "Check config.go voice section"
explanation = "Default is /tmp/piper-daemon.sock, configurable via config.voice.piper_daemon_socket."

[[sprint.question]]
number = 2
tier = "COMPREHENSION"
difficulty = 2
xp = 10
text = "Why does SpeakQuestion skip reading code blocks aloud?"
code = ""
options = [
    "TTS cannot handle code",
    "Code is visual, reading it aloud is confusing",
    "Performance optimization",
    "Voice mode is disabled for code questions"
]
answer = 1
hint = "Think about how code sounds when spoken"
explanation = "Code with braces, semicolons, and symbols sounds garbled. Better to say 'See code snippet below' and show it visually."

[[sprint.question]]
number = 3
tier = "APPLICATION"
difficulty = 3
xp = 15
text = "Typewriter effect is out of sync with speech. What timing calculation is wrong?"
code = """
estimatedMs := wordCount * 400
charsPerMs := float64(len(text)) / float64(estimatedMs)
"""
options = [
    "wordCount calculation is wrong",
    "400ms per word assumes 150 WPM, Piper may be faster",
    "charsPerMs should be inverted",
    "estimatedMs should use character count"
]
answer = 1
hint = "TTS speed varies by engine and voice"
explanation = "The 400ms/word estimate (150 WPM) may not match Piper's actual speed. Should calibrate or use speech duration callback."

