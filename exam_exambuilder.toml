# Sprint 1: Go Architecture
[[sprint]]
number = 1
topic = "Go Architecture"
domain = "architecture"
subdomain = "wails_structure"
target_minutes = 3
voice_compatible = true

[[sprint.question]]
number = 1
tier = "RECALL"
difficulty = 1
xp = 10
text = "What package contains the GUI application entry point?"
code = ""
options = [
    "cmd/kgate-daemon",
    "gui/main.go",
    "internal/app",
    "cmd/kgatectl"
]
answer = 1
hint = "Look at the wails.json configuration"
explanation = "The GUI is a Wails application with its entry point in gui/main.go, separate from the daemon and CLI tools."

[[sprint.question]]
number = 2
tier = "COMPREHENSION"
difficulty = 2
xp = 10
text = "Why does the App struct hold both db.DB and sql.DB references?"
code = """
type App struct {
    db    *db.DB
    sqlDB *sql.DB
}
"""
options = [
    "For database connection pooling",
    "db.DB wraps queries, sql.DB is needed for gamification package",
    "sql.DB is a backup connection",
    "They connect to different databases"
]
answer = 1
hint = "Check what packages use each reference"
explanation = "db.DB provides custom query methods, while gamification functions need the raw *sql.DB to run their own queries."

[[sprint.question]]
number = 3
tier = "APPLICATION"
difficulty = 3
xp = 10
text = "GetSprintQuestions returns nil. What should you check first?"
code = ""
options = [
    "Database connection",
    "If a.active is set (active project ID)",
    "Sprint number validity",
    "JSON parsing errors"
]
answer = 1
hint = "The function has an early return"
explanation = "GetSprintQuestions returns nil immediately if a.active is empty. SetActiveProject must be called first."

