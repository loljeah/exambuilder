<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
<style>
@keyframes breathe{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.03)}}
.body{animation:breathe 2s ease-in-out infinite;transform-origin:center bottom}
</style>
<defs>
  <linearGradient id="snailBody" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#a7f3d0"/>
    <stop offset="100%" stop-color="#6ee7b7"/>
  </linearGradient>
  <linearGradient id="shellGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#fbbf24"/>
    <stop offset="50%" stop-color="#f59e0b"/>
    <stop offset="100%" stop-color="#d97706"/>
  </linearGradient>
</defs>
<g class="body">
  <!-- Shell -->
  <ellipse cx="20" cy="44" rx="16" ry="14" fill="url(#shellGrad)"/>
  <path d="M20,36 Q12,44 20,52 Q28,44 20,36" fill="#d97706" opacity="0.5"/>
  <circle cx="16" cy="44" r="4" fill="#fbbf24" opacity="0.6"/>
  <!-- Body -->
  <path d="M32,56 Q16,58 8,54 Q4,50 8,46 Q12,42 20,44 L20,44 Q28,42 48,44 Q56,46 56,52 Q52,58 32,56 Z" fill="url(#snailBody)"/>
  <!-- Eye stalks -->
  <path d="M26,44 Q26,30 26,12" stroke="#6ee7b7" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M42,44 Q42,30 42,12" stroke="#6ee7b7" stroke-width="4" fill="none" stroke-linecap="round"/>
  <circle cx="26" cy="12" r="5" fill="#6ee7b7"/>
  <circle cx="42" cy="12" r="5" fill="#6ee7b7"/>
  <!-- Eyes on stalks -->
  <path d="M22,18 Q26,22 30,18" stroke="#1e1b4b" fill="none" stroke-width="2" stroke-linecap="round"/><path d="M38,18 Q42,22 46,18" stroke="#1e1b4b" fill="none" stroke-width="2" stroke-linecap="round"/>
  <!-- Face on body -->
  <path d="M30,28 Q34,34 38,28" stroke="#1e1b4b" fill="none" stroke-width="1.5" stroke-linecap="round"/>
</g>
</svg>