<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
<style>
@keyframes breathe{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.03)}}
.body{animation:breathe 2s ease-in-out infinite;transform-origin:center bottom}
</style>
<defs>
  <linearGradient id="catBody" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#ff9999"/>
    <stop offset="100%" stop-color="#f5d0c5"/>
  </linearGradient>
</defs>
<g class="body">
  <!-- Ears -->
  <path d="M16,18 L12,4 L24,14 Z" fill="#f5d0c5"/>
  <path d="M48,18 L52,4 L40,14 Z" fill="#f5d0c5"/>
  <path d="M17,16 L14,6 L22,14 Z" fill="#ff9999"/>
  <path d="M47,16 L50,6 L42,14 Z" fill="#ff9999"/>
  <!-- Head -->
  <ellipse cx="32" cy="32" rx="22" ry="20" fill="url(#catBody)"/>
  <!-- Cheeks -->
  <ellipse cx="16" cy="36" rx="6" ry="4" fill="#ff9999" opacity="0.5"/>
  <ellipse cx="48" cy="36" rx="6" ry="4" fill="#ff9999" opacity="0.5"/>
  <!-- Eyes -->
  <ellipse cx="24" cy="28" rx="3" ry="4" fill="#4a5568"/><ellipse cx="40" cy="28" rx="3" ry="4" fill="#4a5568"/><circle cx="25" cy="27" r="1" fill="white"/><circle cx="41" cy="27" r="1" fill="white"/>
  <!-- Nose -->
  <ellipse cx="32" cy="34" rx="2" ry="1.5" fill="#d4a99a"/>
  <!-- Mouth -->
  <path d="M29,38 Q32,40 35,38" stroke="#4a5568" fill="none" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Whiskers -->
  <g stroke="#d4a99a" stroke-width="0.5" opacity="0.6">
    <line x1="8" y1="32" x2="18" y2="34"/>
    <line x1="8" y1="36" x2="18" y2="36"/>
    <line x1="56" y1="32" x2="46" y2="34"/>
    <line x1="56" y1="36" x2="46" y2="36"/>
  </g>
</g>
</svg>